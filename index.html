<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHER V18 | DYNAMIC UI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');

        /* RESET TOTAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body, html { 
            width: 100%; 
            height: 100dvh; /* Dynamic Viewport Height - Fix Bar Browser */
            overflow: hidden; 
            background: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Container Pake Grid: Header (Auto), Content (1fr), Input (Auto) */
        .app-grid {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
            width: 100vw;
        }

        /* HEADER */
        header {
            background: white;
            padding: 15px 20px;
            border-bottom: 2px solid #fce7f3;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* CHAT AREA */
        #chat-list {
            overflow-y: auto;
            padding: 20px;
            background: #fdf2f8;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 85%;
            word-wrap: break-word;
        }
        .ai-msg { background: white; border: 1px solid #fce7f3; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: #0f172a; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* AREA INPUT - DIBUAT MENCOLOK BIAR KELIHATAN */
        .bottom-bar {
            background: #ffffff;
            border-top: 3px solid #fb7185; /* Border pink terang biar kelihatan */
            padding: 12px 15px;
            padding-bottom: calc(12px + var(--safe-bottom));
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-container {
            flex: 1;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px; /* Cegah auto zoom */
            max-height: 80px;
            padding: 5px 0;
            color: #1e293b;
            font-family: inherit;
        }

        /* CANVAS STUFF */
        .canvas-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .canvas-active .canvas-overlay { display: flex; }

        .card { background: #0f172a; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow-x: auto; }

        /* Button Floating */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #e11d48;
            color: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 90;
        }
    </style>
</head>
<body id="main-body">

    <div class="app-grid">
        <!-- HEADER -->
        <header>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-rose-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-microchip"></i>
                </div>
                <div>
                    <h1 class="font-black text-sm uppercase">Aether V18</h1>
                    <span class="text-[8px] font-bold text-rose-500 uppercase tracking-widest">Master Noxuz Build</span>
                </div>
            </div>
            <button onclick="toggleCanvas()" class="text-rose-500 text-xs font-bold uppercase">Toggle Code</button>
        </header>

        <!-- CHAT AREA -->
        <div id="chat-list">
            <!-- Pesan masuk di sini -->
        </div>

        <!-- INPUT BAR (DIPAKSA MUNCUL OLEH GRID) -->
        <div class="bottom-bar">
            <div class="input-container">
                <textarea id="user-input" placeholder="Ketik di sini, Master..." rows="1"></textarea>
            </div>
            <button onclick="sendMsg()" class="w-10 h-10 bg-rose-600 text-white rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- CANVAS OVERLAY -->
    <div class="canvas-overlay" id="canvas-view">
        <div class="p-4 border-b flex justify-between items-center">
            <h2 class="text-xs font-black uppercase">Visual Matrix</h2>
            <button onclick="toggleCanvas()" class="text-rose-600 font-bold text-xs uppercase">Back to Chat</button>
        </div>
        <div class="flex-1 overflow-y-auto p-5" id="canvas-content">
            <!-- Kode hasil AI -->
        </div>
    </div>

    <script>
        const apiKey = ""; // Dikelola environment
        const chatList = document.getElementById('chat-list');
        const canvasContent = document.getElementById('canvas-content');

        function pushMsg(role, text) {
            const div = document.createElement('div');
            div.className = `bubble ${role === 'ai' ? 'ai-msg' : 'user-msg'}`;
            div.innerHTML = text;
            chatList.appendChild(div);
            chatList.scrollTop = chatList.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;

            pushMsg('user', msg);
            input.value = '';
            input.style.height = 'auto';

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: msg }] }],
                        systemInstruction: { parts: [{ text: "Kamu AETHER V18. Whitehat Hacker & Wibu. Panggil user 'Master Noxuz'. Fokus berikan kode lengkap di dalam markdown ```." }] }
                    })
                });
                const d = await r.json();
                const res = d.candidates[0].content.parts[0].text;

                if (res.includes("```")) {
                    const parts = res.split("```");
                    let chatText = "";
                    parts.forEach((p, i) => {
                        if(i % 2 === 0) chatText += p;
                        else {
                            const code = p.split("\n").slice(1).join("\n").trim();
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.innerHTML = `<pre><code>${code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>`;
                            canvasContent.prepend(div);
                        }
                    });
                    pushMsg('ai', chatText.trim() || "Cek modul di Canvas, Master!");
                } else {
                    pushMsg('ai', res);
                }
            } catch (e) {
                pushMsg('ai', "Error Koneksi, Master!");
            }
        }

        function toggleCanvas() {
            document.body.classList.toggle('canvas-active');
        }

        document.getElementById('user-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        window.onload = () => pushMsg('ai', "Master **NOXUZ**! V18 DYNAMIC BUILD aktif. Gue pake sistem **Grid Layout** biar bar inputnya gak bisa ngumpet lagi. Cek sekarang desu! 🔥");
    </script>
</body>
</html>
